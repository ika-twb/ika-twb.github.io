---
layout: default
---
<article>
  <h1>{{ page.title }}</h1>
  <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.categories %} | Categories: 
    {% for category in page.categories %}
      {{ category }}{% if forloop.last == false %}, {% endif %}
    {% endfor %}
  {% endif %}</p>
  {{ content }}
</article>
