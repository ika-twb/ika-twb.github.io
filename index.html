---
layout: default
title: Home
permalink: /
---

<div class="notes-feed">
  {% assign sorted_notes = site.notes | sort: 'date' | reverse %}
  {% if sorted_notes.size == 0 %}
    <p class="empty-feed">Nothing here yet.</p>
  {% else %}
    {% for note in sorted_notes %}
    <div class="note-entry">
      <time class="note-date"><a href="{{ note.url }}">{{ note.date | date: "%b %-d, %Y" }}</a></time>
      {{ note.content }}
    </div>
    {% endfor %}
  {% endif %}
</div>
